services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: billcore
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: billcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: billcore
      DB_PASSWORD: secret
      DB_NAME: billcore
      SERVER_PORT: 8080
      JWT_SECRET: change-me-in-production
    ports:
      - "8080:8080"

volumes:
  postgres_data:
